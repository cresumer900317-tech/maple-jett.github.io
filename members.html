<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>친구패밀리 | 길드원 목록</title>
  <meta name="description" content="친구패밀리 길드원 목록" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/css/style.css?v=apple-final-002" />
</head>
<body data-page="members">
  <div id="app-shell"></div>

  <main class="page-wrap">
    <section class="container page-hero">
      <p class="eyebrow">Members Archive</p>
      <h1>길드원 목록</h1>
      <p>길드원 데이터는 카드 아카이브처럼 보고, 랭킹은 랭킹 페이지에서 별도로 보는 구조로 분리했습니다.</p>
    </section>

    <section class="container section">
      <div class="section-head members-head">
        <div>
          <p class="eyebrow">Members Filter</p>
          <h2>조건 검색</h2>
        </div>

        <div class="toolbar">
          <div class="search-box">
            <input type="text" id="memberSearchInput" placeholder="캐릭터명 검색" autocomplete="off" />
          </div>

          <div class="select-box">
            <select id="guildFilterSelect">
              <option value="ALL">전체 길드</option>
            </select>
          </div>

          <div class="select-box">
            <select id="sortSelect">
              <option value="power">전투력순</option>
              <option value="level">레벨순</option>
              <option value="popularity">인기도순</option>
              <option value="name">이름순</option>
            </select>
          </div>
        </div>
      </div>

      <div class="members-grid" id="membersGrid"></div>
      <div class="empty-state hidden" id="membersEmptyState">조건에 맞는 캐릭터가 없습니다.</div>
    </section>
  </main>

  <script src="./assets/js/data.js?v=apple-final-002"></script>
  <script src="./assets/js/common.js?v=apple-final-002"></script>
  <script src="./assets/js/members.js?v=apple-final-002"></script>
</body>
</html>
