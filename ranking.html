<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>친구패밀리 | 랭킹</title>
  <meta name="description" content="친구패밀리 전체 랭킹" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/css/style.css?v=apple-grid-final-003" />
</head>
<body data-page="ranking">
  <div id="app-shell"></div>

  <main class="page-wrap">
    <section class="container page-hero">
      <p class="eyebrow">Family Ranking</p>
      <h1 class="page-title">친구패밀리 전체 랭킹</h1>
      <p class="page-desc">전투력, 레벨, 인기도 기준으로 전체 순위를 읽기 좋은 밀도와 정렬로 제공합니다.</p>
    </section>

    <section class="container section-block ranking-layout">
      <aside class="surface ranking-filter-panel">
        <div class="panel-section">
          <p class="eyebrow">Ranking Filter</p>
          <h2 class="section-title section-title-small">필터</h2>

          <div id="rankingTabs" class="tab-stack">
            <button class="tab-btn is-active" data-tab="power">전투력</button>
            <button class="tab-btn" data-tab="level">레벨</button>
            <button class="tab-btn" data-tab="popularity">인기도</button>
          </div>
        </div>

        <div class="panel-divider"></div>

        <div class="panel-section">
          <p class="eyebrow">Live Summary</p>
          <div class="mini-summary-list">
            <div class="mini-summary-row">
              <span>기준</span>
              <strong id="rankingMetricLabel">전투력</strong>
            </div>
            <div class="mini-summary-row">
              <span>표시 범위</span>
              <strong>TOP 50</strong>
            </div>
            <div class="mini-summary-row">
              <span>상태</span>
              <strong id="rankingApiText">실시간 반영</strong>
            </div>
          </div>
        </div>
      </aside>

      <section class="surface ranking-main-panel">
        <div class="ranking-panel-head">
          <div>
            <p class="eyebrow">Ranking Table</p>
            <h2 class="section-title">전체 순위표</h2>
          </div>
        </div>

        <div class="ranking-scroll-frame">
          <div class="table-wrap ranking-scroll-area">
            <table class="ranking-table">
              <thead>
                <tr>
                  <th>순위</th>
                  <th>캐릭터</th>
                  <th>길드</th>
                  <th>레벨</th>
                  <th>전투력</th>
                  <th>인기도</th>
                  <th>주간 변화</th>
                </tr>
              </thead>
              <tbody id="rankingTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="./assets/js/data.js?v=apple-grid-final-003"></script>
  <script src="./assets/js/common.js?v=apple-grid-final-003"></script>
  <script src="./assets/js/ranking.js?v=apple-grid-final-003"></script>
</body>
</html>
