<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>친구패밀리 | 랭킹</title>
  <meta name="description" content="친구패밀리 전체 랭킹" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./assets/css/style.css?v=apple-final-001" />
</head>
<body data-page="ranking">
  <div id="app-shell"></div>

  <main class="page-wrap">
    <section class="container page-hero">
      <p class="eyebrow">Family Ranking</p>
      <h1>친구패밀리 전체 랭킹</h1>
      <p>전투력 · 레벨 · 인기도 기준으로 친구패밀리 전체 순위를 확인할 수 있습니다.</p>
    </section>

    <section class="container section">
      <div class="section-head">
        <div>
          <p class="eyebrow">Ranking Filter</p>
          <h2>랭킹 탭</h2>
        </div>

        <div class="tab-group" id="rankingTabs">
          <button class="tab-btn is-active" data-tab="power">전투력</button>
          <button class="tab-btn" data-tab="level">레벨</button>
          <button class="tab-btn" data-tab="popularity">인기도</button>
        </div>
      </div>

      <section class="content-panel">
        <div class="table-wrap">
          <table class="ranking-table">
            <thead>
              <tr>
                <th>순위</th>
                <th>캐릭터</th>
                <th>길드</th>
                <th>레벨</th>
                <th>전투력</th>
                <th>인기도</th>
                <th>주간 변화</th>
              </tr>
            </thead>
            <tbody id="rankingTableBody"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script src="./assets/js/data.js?v=apple-final-001"></script>
  <script src="./assets/js/common.js?v=apple-final-001"></script>
  <script src="./assets/js/ranking.js?v=apple-final-001"></script>
</body>
</html>
