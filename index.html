<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>친구 패밀리</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <h1 class="logo">친구 패밀리</h1>
    <nav>
      <a href="#dashboard">대시보드</a>
      <a href="#weekly">위클리</a>
      <a href="#ranking">전체순위</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h2>FRIEND FAMILY</h2>
    <p>데이터 기반 길드 운영 시스템</p>

    <div class="hero-stats">
      <div class="stat">
        <span>전체 인원</span>
        <strong id="total-count">-</strong>
      </div>
      <div class="stat">
        <span>평균 전투력</span>
        <strong id="avg-power">-</strong>
      </div>
      <div class="stat">
        <span>평균 레벨</span>
        <strong id="avg-level">-</strong>
      </div>
    </div>
  </div>
</section>

<!-- GUILD CARDS -->
<section class="guild-section">
  <h2>길드 구성</h2>
  <div class="guild-grid" id="guild-list"></div>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="section">
  <h2>패밀리 대시보드</h2>
  <div class="dashboard-grid" id="guild-table"></div>
</section>

<!-- WEEKLY -->
<section id="weekly" class="section">
  <h2>위클리 TOP</h2>
  <div class="weekly-grid">
    <div id="weekly-level"></div>
    <div id="weekly-power"></div>
    <div id="weekly-popularity"></div>
  </div>
</section>

<!-- RANKING -->
<section id="ranking" class="section">
  <h2>전체 순위</h2>

  <div class="sort-box">
    <button onclick="sortRanking('power')">전투력</button>
    <button onclick="sortRanking('level')">레벨</button>
    <button onclick="sortRanking('popularity')">인기</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>순위</th>
        <th>닉네임</th>
        <th>길드</th>
        <th>레벨</th>
        <th>전투력</th>
      </tr>
    </thead>
    <tbody id="ranking-body"></tbody>
  </table>
</section>

<script src="script.js"></script>
</body>
</html>
