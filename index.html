  <style>
    .boot-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      background: linear-gradient(180deg, #f7faff 0%, #f3f6fb 100%);
    }

    .boot-card {
      width: min(640px, 100%);
      background: #ffffff;
      border: 1px solid #d7e1ee;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      padding: 28px 24px;
    }

    .boot-brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    .boot-title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.02;
      letter-spacing: -0.05em;
      font-weight: 900;
      color: #0b1b3a;
    }

    .boot-sub {
      margin: 0;
      color: #64748b;
      font-size: 0.98rem;
      font-weight: 600;
    }

    .boot-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .boot-chip {
      border: 1px solid #d7e1ee;
      border-radius: 16px;
      background: #fbfdff;
      padding: 16px;
    }

    .boot-chip-label {
      color: #7b8ba1;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .boot-chip-value {
      color: #0f172a;
      font-size: 1.05rem;
      font-weight: 800;
      line-height: 1.3;
    }

    .boot-loading {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #475569;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .boot-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #2563eb;
      box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.45);
      animation: bootPulse 1.4s infinite;
    }

    @keyframes bootPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.45);
      }
      70% {
        box-shadow: 0 0 0 10px rgba(37, 99, 235, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(37, 99, 235, 0);
      }
    }

    @media (max-width: 760px) {
      .boot-grid {
        grid-template-columns: 1fr;
      }

      .boot-card {
        padding: 22px 18px;
        border-radius: 20px;
      }
    }
  </style>
