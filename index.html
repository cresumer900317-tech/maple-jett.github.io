<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>친구패밀리 | 홈</title>
  <meta name="description" content="친구패밀리 길드 포털" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/css/style.css?v=rank-premium-005" />
</head>
<body data-page="home">
  <div id="app-shell"></div>

  <main class="page-wrap">
    <section class="container home-top-grid">
      <section class="surface hero-panel hero-main">
        <h1 class="hero-title">친구패밀리</h1>
        <p class="hero-desc hero-desc-compact">
          친구들 · 친구둘 · 친구삼 · 친구넷 · 친구닷의 랭킹, 성장, 공지 데이터를 한곳에서 확인하는 길드 포털
        </p>

        <div class="hero-meta-grid">
          <article class="metric-card">
            <span class="metric-label">마지막 갱신</span>
            <strong class="metric-value nowrap" id="latestSnapshotAt">불러오는 중...</strong>
          </article>
          <article class="metric-card">
            <span class="metric-label">주간 기준</span>
            <strong class="metric-value nowrap" id="weeklyBaseAt">불러오는 중...</strong>
          </article>
          <article class="metric-card">
            <span class="metric-label">주간 범위</span>
            <strong class="metric-value nowrap" id="weekRange">불러오는 중...</strong>
          </article>
        </div>
      </section>

      <aside class="surface hero-panel hero-side">
        <div class="section-header section-header-tight">
          <div>
            <h2 class="section-title">운영 현황</h2>
          </div>
          <div id="apiStatus" class="status-badge is-loading">LOADING</div>
        </div>

        <div id="summaryCards" class="summary-grid"></div>
      </aside>

      <aside class="surface hero-panel hero-notice">
        <div class="section-header section-header-tight">
          <div>
            <h2 class="section-title">최근 공지</h2>
          </div>
          <a class="section-link" href="./notice.html">전체 보기</a>
        </div>

        <div id="homeNoticeCompact" class="notice-compact-list"></div>
      </aside>
    </section>

    <section class="container section-block">
      <div class="section-header">
        <div>
          <h2 class="section-title">길드별 요약</h2>
        </div>
      </div>
      <div id="guildGrid" class="guild-summary-grid"></div>
    </section>

    <section class="container section-block">
      <div class="section-header">
        <div>
          <h2 class="section-title">전체 랭킹 TOP 30</h2>
        </div>
        <a class="section-link" href="./ranking.html">전체 순위표 보기</a>
      </div>

      <section class="surface panel-table">
        <div class="table-wrap home-preview-scroll">
          <table class="ranking-table ranking-table-compact">
            <thead>
              <tr>
                <th>순위</th>
                <th>캐릭터</th>
                <th>길드</th>
                <th>Lv</th>
                <th>전투력</th>
              </tr>
            </thead>
            <tbody id="homeRankingPreviewBody"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <div id="guildDetailModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-dialog modal-dialog-scroll">
      <div class="section-header">
        <div>
          <h3 class="modal-title" id="guildModalTitle">길드 상세</h3>
        </div>
        <button id="guildModalClose" class="modal-close" type="button" aria-label="닫기">✕</button>
      </div>

      <div id="guildModalMeta" class="modal-meta-grid"></div>

      <section class="modal-block">
        <div class="modal-block-head">
          <strong>핵심 인원 TOP 3</strong>
        </div>
        <div id="guildModalTopMembers" class="modal-member-list"></div>
      </section>
    </div>
  </div>

  <script src="./assets/js/data.js?v=rank-premium-005"></script>
  <script src="./assets/js/common.js?v=rank-premium-005"></script>
  <script src="./assets/js/home.js?v=rank-premium-005"></script>
</body>
</html>
