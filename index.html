<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>친구 패밀리</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<header class="header">
  <h1>친구 패밀리</h1>
  <nav>
    <a href="#">소개</a>
    <a href="#dashboard">대시보드</a>
    <a href="#ranking">전체 순위</a>
  </nav>
</header>

<main class="container">

  <!-- 메인 -->
  <section class="hero">
    <h2>친구 패밀리 공식 홈페이지</h2>
    <p>길드 통합 대시보드 & 전체 순위 시스템</p>
  </section>

  <!-- 대시보드 -->
  <section id="dashboard" class="section">
    <h2>대시보드</h2>
    <div class="card-grid">

      <div class="card">
        <p>전체 인원</p>
        <h3 id="total-count">-</h3>
      </div>

      <div class="card">
        <p>평균 전투력</p>
        <h3 id="avg-power">-</h3>
      </div>

      <div class="card">
        <p>평균 레벨</p>
        <h3 id="avg-level">-</h3>
      </div>

    </div>
  </section>

  <!-- 전체 순위 -->
  <section id="ranking" class="section">
    <h2>전체 순위</h2>

    <table>
      <thead>
        <tr>
          <th>순위</th>
          <th>닉네임</th>
          <th>길드</th>
          <th>레벨</th>
          <th>전투력</th>
        </tr>
      </thead>
      <tbody id="ranking-body"></tbody>
    </table>

  </section>

</main>

<footer class="footer">
  <p>© 2026 친구 패밀리</p>
</footer>

<script src="script.js"></script>
</body>
</html>
